<div class="page-gestion">
    
    <div class="gestion-header">
        <button id="btn-retour-gestion" class="genre-btn">← Retour à l'Atelier</button>
        <button id="btn-edit-histoire" class="genre-btn btn-outline-blue shadow-active">⚙️ Modifier les infos du Grimoire</button>
    </div>

    <section id="info-histoire-panel" class="card info-panel">
        <p class="loading-text">Déchiffrage des runes en cours...</p>
    </section>

    <section class="volumes-section card">
        <div class="chapters-header">
            <h2 class="title-m0">Volumes du Grimoire</h2>
        </div>

        <div id="volumes-liste" class="volumes-list">
            <p class="loading-text">Lecture des volumes...</p>
        </div>

        <form id="volume-create-form" class="volume-form mt-15">
            <div class="form-group volume-title-group">
                <label for="volume-title">Nom du volume</label>
                <input type="text" id="volume-title" class="custom-input" placeholder="Ex: Volume I - Les Cendres">
            </div>
            <div class="form-group volume-cover-group">
                <label for="volume-cover-file">Couverture du volume (optionnelle)</label>
                <input type="file" id="volume-cover-file" accept="image/*" class="custom-input">
            </div>
            <button type="submit" id="btn-create-volume" class="genre-btn btn-primary">Créer le volume</button>
        </form>
    </section>

    <section class="chapitres-section">
        <div class="chapters-header">
            <h2 class="title-m0">Les Parchemins (Chapitres)</h2>
            <button id="btn-add-chapitre" class="btn-primary">+ Forger un Chapitre</button>
        </div>

        <div class="chapter-section">
            <div class="chapter-section-toolbar">
                <h3 class="chapter-section-title-brouillon">📝 Brouillons (Cachés)</h3>
                <label class="chapter-page-size">
                    <span>Afficher</span>
                    <select id="gestion-brouillons-page-size" class="custom-select" data-gestion-page-size="brouillons">
                        <option value="15" selected>15</option>
                        <option value="30">30</option>
                        <option value="50">50</option>
                    </select>
                </label>
            </div>
            <div id="liste-brouillons" class="chapter-list"></div>
            <div id="pagination-brouillons" class="chapter-pagination hidden"></div>
        </div>

        <div class="chapter-section">
            <div class="chapter-section-toolbar">
                <h3 class="chapter-section-title-programme">⏳ Programmés (En attente)</h3>
                <label class="chapter-page-size">
                    <span>Afficher</span>
                    <select id="gestion-programmes-page-size" class="custom-select" data-gestion-page-size="programmes">
                        <option value="15" selected>15</option>
                        <option value="30">30</option>
                        <option value="50">50</option>
                    </select>
                </label>
            </div>
            <div id="liste-programmes" class="chapter-list"></div>
            <div id="pagination-programmes" class="chapter-pagination hidden"></div>
        </div>

        <div class="chapter-section">
            <div class="chapter-section-toolbar">
                <h3 class="chapter-section-title-publie">👁️ Publiés (Visibles de tous)</h3>
                <label class="chapter-page-size">
                    <span>Afficher</span>
                    <select id="gestion-publies-page-size" class="custom-select" data-gestion-page-size="publies">
                        <option value="15" selected>15</option>
                        <option value="30">30</option>
                        <option value="50">50</option>
                    </select>
                </label>
            </div>
            <div id="liste-publies" class="chapter-list"></div>
            <div id="pagination-publies" class="chapter-pagination hidden"></div>
        </div>
    </section>

</div>
