<div class="page-forge">
    
    <section class="welcome-banner">
        <div class="welcome-content">
            <h2>L'Atelier des Comtes</h2>
            <p>
                C'est ici, dans le fracas de l'encre et de la pensée, que vos récits prennent vie. 
                Gérez vos grimoires existants ou forgez une nouvelle légende.
            </p>
            <div class="forge-actions" style="margin-top: 20px;">
                <button id="btn-publish" class="btn-primary">Forger une nouvelle œuvre</button>
                <button id="btn-retour-studio" class="btn-ghost">Quitter l'Atelier</button>
            </div>
        </div>
    </section>

    <section class="my-stories-section" style="max-width: 800px; margin: 0 auto;">
        <h3 style="text-align: center; margin-bottom: 20px; text-transform: uppercase;">Vos Œuvres en cours</h3>
        
        <div style="display: flex; justify-content: flex-end; margin-bottom: 15px;">
            <select id="tri-oeuvres" class="genre-btn" style="padding: 5px 10px; background: var(--bg-box); color: var(--text-main); font-size: 0.9rem;">
                <option value="recent">Tri : Plus récentes d'abord</option>
                <option value="ancien">Tri : Plus anciennes d'abord</option>
                <option value="az">Tri : Alphabétique (A - Z)</option>
                <option value="za">Tri : Alphabétique (Z - A)</option>
            </select>
        </div>

        <div id="mes-oeuvres-liste" style="display: flex; flex-direction: column; gap: 15px;">
            <p class="loading-text">Recherche de vos parchemins...</p>
        </div>
    </section>

</div>
