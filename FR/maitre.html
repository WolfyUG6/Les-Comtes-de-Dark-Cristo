<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Comtes de Dark & Cristo</title>
    
    <meta name="description" content="Les Comtes de Dark & Cristo — Sanctuaire du WebNovel sérieux. Dark Fantasy, Romantasy Tragique, Sci-Fi & Horreur Psychologique.">
    
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="theme-original.css" id="theme-stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/fr.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
</head>
<body>

    <header id="main-header">
        <div id="bandeau-top"></div>

        <div id="mini-logo" class="hidden">
            <img src="Logo.png" alt="Logo">
            <span>Les Comtes de Dark & Cristo</span>
        </div>

        <div id="auth-container">
            <button id="btn-login" class="genre-btn">Se connecter</button>
            <button id="btn-signup" class="genre-btn btn-primary">Créer un compte</button>
        </div>

        <div id="user-container" class="hidden">
            <img id="header-avatar" src="default-avatar.png" alt="Avatar">
            <span id="user-name"></span>
            
            <div class="dropdown">
                <button id="btn-profile-main" class="genre-btn">Mon Profil ▼</button>
                <div class="dropdown-content">
					<button id="btn-quartiers-nav" class="dropdown-item" onclick="window.changerDePage('quartiers')">Vos Quartiers</button>
					<button id="btn-lectures-nav" class="dropdown-item" onclick="window.changerDePage('lectures')">Vos Lectures</button>
					<button id="btn-atelier-nav" class="dropdown-item" onclick="window.changerDePage('studio')">La Forge (Auteur)</button>
				</div>
            </div>
            <button id="btn-logout" class="genre-btn btn-danger">Quitter</button>
        </div>

        <div id="hero-logo-area">
            <div id="logo-container">
                <img src="Logo.png" alt="Les Comtes de Dark & Cristo">
            </div>
            <h1>Les Comtes de Dark & Cristo</h1>
        </div>
        
        <div class="language-picker">
            <button>FR</button>
            <button>EN</button>
            <button>JP</button>
        </div>
    </header>
    
    <nav id="main-genre-menu" class="genre-menu">
        <ul>
            <li><button class="genre-btn" data-genre="accueil">Le Hall (Accueil)</button></li>
            <li><button class="genre-btn" data-genre="High & Low Fantasy">High & Low Fantasy</button></li>
            <li><button class="genre-btn" data-genre="Dark Fantasy & Grimdark">Dark Fantasy & Grimdark</button></li>
            <li><button class="genre-btn" data-genre="Romantasy Tragique">Romantasy Tragique</button></li>
            <li><button class="genre-btn" data-genre="Sci-Fi & Cyberpunk">Sci-Fi & Cyberpunk</button></li>
            <li><button class="genre-btn" data-genre="Horreur Psychologique">Horreur Psychologique</button></li>
        </ul>
    </nav>

    <main id="sanctuaire-root">
        </main>
    
    <footer id="main-footer">
        <div class="footer-content">
            <div class="footer-brand">
                <img src="Logo.png" alt="Logo">
                <p class="brand-title">Les Comtes de Dark & Cristo</p>
                <p class="brand-subtitle">Sanctuaire du WebNovel sérieux.</p>
            </div>

            <div class="footer-theme-toggle">
                <p>Mécanisme Occulte</p>
                <div class="tri-state-toggle" id="footer-toggle" data-active="1">
                    <button class="toggle-btn active" data-state="1">Original</button>
                    <button class="toggle-btn" data-state="2">Abysse</button>
                    <button class="toggle-btn" data-state="3">Lumière</button>
                </div>
            </div>

            <div class="footer-links">
                <a href="#">Conditions d'Utilisation</a>
                <a href="#">Mentions Légales</a>
                <a href="https://discord.gg/3AczcSrmjf" target="_blank" class="discord-link">
                    <svg width="20" height="20" viewBox="0 0 127.14 96.36" fill="currentColor"><path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77.7,77.7,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.31,60,73.31,53s5-12.74,11.43-12.74S96.3,46,96.19,53,91.08,65.69,84.69,65.69Z"/></svg>
                    Rejoindre le Culte
                </a>
            </div>
        </div>
        <div class="footer-copyright">
            &copy; 2026 Les Comtes de Dark & Cristo. Tous droits réservés.
        </div>
    </footer>

    <div id="auth-modal" class="modal hidden">
        <h2>Entrez dans le Sanctuaire</h2>
        <input type="email" id="email-input" placeholder="Votre Email">
        <input type="password" id="password-input" placeholder="Votre Mot de Passe">
        
        <div class="modal-actions">
            <button id="submit-auth" class="genre-btn">Valider</button>
            <button id="close-modal" class="genre-btn btn-ghost">Fermer</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="routeur.js"></script> 
    <script src="auth.js"></script>
	<script src="bibliotheque.js"></script>
	<script src="forge.js"></script> 
	<script src="gestion.js"></script>
    <script src="editeur.js"></script>
    <script src="creationstory.js"></script>
    <script src="categoriegenre.js"></script>
    <script src="histoire.js"></script>
</body>
</html>
