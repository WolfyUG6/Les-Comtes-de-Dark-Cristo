<div class="page-editeur">
    <div class="editor-header">
        <button id="btn-retour-creation" class="genre-btn">← Retour à l'Atelier</button>
        <h2 class="title-m0">Graver une Nouvelle Œuvre</h2>
        <div class="editor-actions">
            <button id="submit-story" class="genre-btn btn-primary shadow-active">Forger l'Histoire</button>
        </div>
    </div>

    <div class="editor-container">
        
        <div class="form-group">
            <label for="story-title">Titre de l'Œuvre</label>
            <input type="text" id="story-title" class="custom-input" placeholder="Ex: Le Chant de l'Abysse">
        </div>

        <div class="form-group">
            <label for="story-synopsis">Synopsis / Quatrième de couverture</label>
            <textarea id="story-synopsis" class="custom-input" rows="6" placeholder="Racontez-nous les prémices de votre histoire..."></textarea>
        </div>

        <div style="display: flex; gap: 20px; flex-wrap: wrap;">
            <div class="form-group" style="flex: 1; min-width: 250px;">
                <label for="story-genre">Genre Littéraire dominant</label>
                <select id="story-genre" class="custom-input custom-select">
                    <option value="">-- Choisissez le genre --</option>
                    <option value="High & Low Fantasy">High & Low Fantasy</option>
                    <option value="Dark Fantasy & Grimdark">Dark Fantasy & Grimdark</option>
                    <option value="Romantasy Tragique">Romantasy Tragique</option>
                    <option value="Sci-Fi & Cyberpunk">Sci-Fi & Cyberpunk</option>
                    <option value="Horreur Psychologique">Horreur Psychologique</option>
                </select>
            </div>

            <div class="form-group" style="flex: 1; min-width: 250px;">
                <label for="story-age">Classification par âge</label>
                <select id="story-age" class="custom-input custom-select">
                    <option value="">-- Type de public --</option>
                    <option value="Tout public">Tout public</option>
                    <option value="Adolescent (12+)">Adolescent (12+)</option>
                    <option value="Jeune Adulte (16+)">Jeune Adulte (16+)</option>
                    <option value="Mature (18+)">Mature (18+)</option>
                </select>
            </div>
            
            <div class="form-group" style="flex: 1; min-width: 250px;">
                <label for="story-status">Statut de l'Œuvre</label>
                <select id="story-status" class="custom-input custom-select">
                    <option value="✍️ En cours">✍️ En cours</option>
                    <option value="✅ Terminé">✅ Terminé</option>
                    <option value="⏳ En pause">⏳ En pause</option>
                    <option value="☠️ Abandonné">☠️ Abandonné</option>
                </select>
            </div>
        </div>

        <div class="form-group mb-15">
            <label class="checkbox-label">
                <input type="checkbox" id="story-sensible">
                <strong class="text-error">Cette œuvre contient des sujets sensibles, immoraux, de la violence crue ou des déclencheurs émotionnels (Trigger Warnings).</strong>
            </label>
        </div>

        <div class="form-group publish-options">
            <label for="story-cover-file">Couverture de l'Œuvre (Optionnelle - Format Image, 2Mo max)</label>
            <input type="file" id="story-cover-file" accept="image/*" class="custom-input" style="background: transparent; border: none; padding-left: 0;">
            <p class="text-muted text-small text-muted-italic mt-15">Une bannière automatique sera générée si vous ne fournissez aucune illustration des abysses.</p>
        </div>

    </div>
</div>
