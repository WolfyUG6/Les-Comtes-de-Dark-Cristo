<div class="page-histoire">
    <div class="histoire-header">
        <button id="btn-retour-bibliotheque" class="genre-btn" onclick="window.changerDePage('accueil')">← Retour à la Bibliothèque</button>
        <button id="btn-retirer-histoire" class="genre-btn btn-outline-red hidden">Retirer l'histoire</button>
    </div>

    <section id="histoire-presentation-panel" class="card info-panel">
        <p class="loading-text">Déchiffrage des runes en cours...</p>
    </section>

    <section class="histoire-actions-container mb-15 card">
        <div id="prochain-chapitre-box" class="prochain-chapitre text-center mb-15">
            <span class="text-muted-italic">Lecture des astres en cours...</span>
        </div>
        <div class="histoire-actions">
            <button id="btn-suivre-histoire" class="genre-btn btn-primary">Suivre l'Histoire</button>
            <button id="btn-partager-histoire" class="genre-btn btn-outline-blue">Copier le lien</button>
        </div>
    </section>

    <section id="histoire-volumes-section" class="histoire-volumes-section card hidden">
        <div class="histoire-volumes-header">
            <button id="volumes-scroll-left" class="genre-btn volume-scroll-btn" type="button" aria-label="Volumes précédents">‹</button>
            <div id="histoire-volumes-strip" class="histoire-volumes-strip"></div>
            <button id="volumes-scroll-right" class="genre-btn volume-scroll-btn" type="button" aria-label="Volumes suivants">›</button>
        </div>
    </section>

    <section class="chapitres-section">
        <div class="chapters-header">
            <h2 class="title-m0">Liste des Parchemins (Chapitres)</h2>
            <label class="chapter-page-size">
                <span>Afficher</span>
                <select id="histoire-chapitres-page-size" class="custom-select">
                    <option value="15" selected>15</option>
                    <option value="30">30</option>
                    <option value="50">50</option>
                </select>
            </label>
        </div>
        
        <div class="chapter-list" id="lecteur-chapitres-liste">
            <!-- La liste des chapitres publiés s'affichera ici -->
        </div>
        <div id="histoire-chapitres-pagination" class="chapter-pagination hidden"></div>
    </section>

    <section id="commentaires-histoire-section" class="commentaires-section mt-15 card hidden" data-commentaires-root>
        <div class="commentaires-header">
            <h2 class="title-m0">Commentaires</h2>
            <label class="commentaires-tri-wrap" for="commentaires-histoire-tri">
                <span class="text-small text-muted">Tri</span>
                <select id="commentaires-histoire-tri" class="custom-select commentaires-tri" data-role="tri">
                    <option value="recents">Plus recents</option>
                    <option value="anciens">Plus anciens</option>
                </select>
            </label>
        </div>

        <p class="text-small text-muted commentaires-intro mt-15">Commentaires globaux de l'histoire.</p>
        <p class="commentaires-feedback text-small mt-15 hidden" data-role="feedback"></p>
        <div class="commentaires-reponse-info text-small hidden" data-role="reply-state">
            <span data-role="reply-label"></span>
            <button type="button" class="genre-btn btn-outline-blue btn-small-last" data-action="cancel-reply">Annuler la reponse</button>
        </div>

        <form class="commentaires-form mt-15" data-role="form">
            <textarea
                id="commentaires-histoire-message"
                class="custom-input commentaires-textarea"
                data-role="message"
                minlength="50"
                maxlength="1000"
                required
                placeholder="Ecrivez votre commentaire en francais..."
            ></textarea>
            <div class="commentaires-form-footer">
                <span class="commentaires-limites text-small text-muted" data-role="compteur">0 / 1000</span>
                <button type="submit" class="genre-btn btn-primary">Publier</button>
            </div>
        </form>

        <p class="commentaires-empty text-muted-italic text-center mt-15 hidden" data-role="vide">Aucun commentaire pour le moment.</p>
        <div class="commentaires-list mt-15" data-role="liste"></div>
    </section>

</div>
