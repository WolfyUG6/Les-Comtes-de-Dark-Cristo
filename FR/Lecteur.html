<!-- BANDEAU STICKY (Fixe en pleine largeur) -->
<div id="lecture-header-fixe" class="lecture-header-fixe">
    <h1 id="lecture-titre" class="lecture-titre-m0">Déchiffrement...</h1>
    <div class="lecture-nav-fixe">
        <button id="btn-chap-prec-haut" class="btn-lecture-nav-fixe hidden">← Précédent</button>
        <button id="btn-chap-suiv-haut" class="btn-lecture-nav-fixe hidden">Suivant →</button>
    </div>
</div>

<div class="page-lecteur" id="page-lecteur-container">
    <!-- LA JAUGE DE SANG (Toujours visible, même en mode Zen) -->
    <div id="lecture-progress-container" class="lecture-progress-container">
        <div id="lecture-progress-bar" class="lecture-progress-bar"></div>
    </div>
    
    <!-- LA BULLE DE PROGRESSION -->
    <div id="lecture-pourcentage-bulle" class="lecture-pourcentage-bulle">0%</div>

    <!-- LE PUPITRE DES RÉGLAGES (Menu latéral) -->
    <div id="lecture-settings" class="lecture-settings">
        <button id="btn-toggle-pupitre" class="btn-toggle-pupitre" aria-label="Afficher/Masquer les réglages">«</button>
        <div class="pupitre-content">
            <h3 class="pupitre-title">Le Pupitre</h3>
            
            <div class="pupitre-group">
                <label>Fonds de Parchemin</label>
                <div class="theme-buttons">
                    <button id="btn-theme-sombre" class="genre-btn btn-small">Abysses</button>
                    <button id="btn-theme-sepia" class="genre-btn btn-small">Vieux Papier</button>
                    <button id="btn-theme-clair" class="genre-btn btn-small">Lumière</button>
                </div>
            </div>

            <div class="pupitre-group">
                <label>Taille de la Plume</label>
                <div class="size-buttons">
                    <button id="btn-text-minus" class="genre-btn btn-small w-100">A-</button>
                    <button id="btn-text-plus" class="genre-btn btn-small w-100">A+</button>
                </div>
            </div>

            <div class="pupitre-group">
                <label>Largeur du Parchemin</label>
                <div class="size-buttons">
                    <button id="btn-width-minus" class="genre-btn btn-small w-100" style="font-size: 0.8rem; font-weight: bold;">↔️ -</button>
                    <button id="btn-width-plus" class="genre-btn btn-small w-100" style="font-size: 0.8rem; font-weight: bold;">↔️ +</button>
                </div>
            </div>

            <div class="pupitre-group">
                <label>Calligraphie</label>
                <select id="select-font" class="custom-select pupitre-select w-100">
                    <option value="'Raleway', sans-serif">Raleway (Moderne)</option>
                    <option value="'Garamond', serif">Garamond (Classique)</option>
                    <option value="'Cinzel', serif">Cinzel (Ancienne)</option>
                    <option value="'Times New Roman', Times, serif">Times New Roman</option>
                </select>
            </div>

            <div class="pupitre-group mt-15">
                <button id="btn-mode-zen" class="genre-btn btn-outline-blue w-100 mb-10">👁️ Plein Écran</button>
                <div class="size-buttons">
                    <button id="btn-pupitre-scroll-top" class="genre-btn w-100" style="font-size: 0.9rem;">⬆️ Sommet</button>
                    <button id="btn-pupitre-scroll-bottom" class="genre-btn w-100" style="font-size: 0.9rem;">⬇️ Abysses</button>
                </div>
            </div>
            
            <div class="pupitre-group mt-15">
                <button id="btn-retour-oeuvre" class="genre-btn btn-outline-red w-100">← Quitter la lecture</button>
            </div>
        </div>
    </div>

    <!-- LE CONTENU DU CHAPITRE -->
    <div id="lecture-contenu" class="lecture-contenu card">
        <!-- Les notes de début, le texte, et les notes de fin s'injecteront ici -->
    </div>

    <!-- NAVIGATION BAS -->
    <div class="lecteur-navigation nav-bas mt-15 mb-15">
        <button id="btn-chap-prec-bas" class="btn-lecture-nav-fixe hidden">← Précédent</button>
        <button id="btn-chap-suiv-bas" class="btn-lecture-nav-fixe hidden">Suivant →</button>
    </div>

    <section id="commentaires-chapitre-section" class="commentaires-section commentaires-chapitre card hidden" data-commentaires-root>
        <div class="commentaires-header">
            <h2 class="title-m0">Commentaires du chapitre</h2>
            <label class="commentaires-tri-wrap" for="commentaires-chapitre-tri">
                <span class="text-small text-muted">Tri</span>
                <select id="commentaires-chapitre-tri" class="custom-select commentaires-tri" data-role="tri">
                    <option value="recents">Plus recents</option>
                    <option value="anciens">Plus anciens</option>
                </select>
            </label>
        </div>

        <p class="text-small text-muted commentaires-intro mt-15">Commentaires lies a ce chapitre.</p>
        <p class="commentaires-feedback text-small mt-15 hidden" data-role="feedback"></p>

        <form class="commentaires-form mt-15" data-role="form">
            <textarea
                id="commentaires-chapitre-message"
                class="custom-input commentaires-textarea"
                data-role="message"
                minlength="500"
                maxlength="5000"
                required
                placeholder="Ecrivez votre commentaire en francais..."
            ></textarea>
            <div class="commentaires-form-footer">
                <span class="commentaires-limites text-small text-muted" data-role="compteur">0 / 5000</span>
                <button type="submit" class="genre-btn btn-primary">Publier</button>
            </div>
        </form>

        <p class="commentaires-empty text-muted-italic text-center mt-15 hidden" data-role="vide">Aucun commentaire pour le moment.</p>
        <div class="commentaires-list mt-15" data-role="liste"></div>
    </section>

    <!-- BOUTONS DE DÉFILEMENT RAPIDE -->
    <button id="btn-scroll-top" class="btn-scroll btn-scroll-top" aria-label="Haut de page">▲</button>
    <button id="btn-scroll-bottom" class="btn-scroll btn-scroll-bottom" aria-label="Bas de page">▼</button>

</div>
