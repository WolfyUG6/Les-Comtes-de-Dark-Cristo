<div class="page-accueil page-categorie-genre">
    
    <div class="welcome-banner">
        <div class="welcome-content">
            <h2 id="genre-page-title" class="title-m0">Rayonnage : Lecture de l'Âme</h2>
            <p class="text-muted text-muted-italic mt-15">Explorez les manuscrits de cette dimension...</p>
        </div>
    </div>

    <div class="my-stories-section">
        <div class="category-toolbar">
            <label class="chapter-page-size category-search-field" for="category-search">
                <span>Rechercher</span>
                <input id="category-search" class="custom-input" type="search" placeholder="Titre, auteur...">
            </label>

            <label class="chapter-page-size" for="category-page-size">
                <span>Afficher</span>
                <select id="category-page-size" class="custom-select">
                    <option value="15" selected>15</option>
                    <option value="30">30</option>
                    <option value="50">50</option>
                </select>
            </label>

            <label class="chapter-page-size" for="category-sort">
                <span>Trier par</span>
                <select id="category-sort" class="custom-select">
                    <option value="published_desc" selected>Date de publication (plus récente)</option>
                    <option value="published_asc">Date de publication (plus ancienne)</option>
                    <option value="name_asc">Nom A - Z</option>
                    <option value="name_desc">Nom Z - A</option>
                    <option value="author_asc">Auteur A - Z</option>
                    <option value="author_desc">Auteur Z - A</option>
                    <option value="updated_desc">Date de mise à jour (plus récente)</option>
                </select>
            </label>
        </div>

        <div id="genre-stories-list" class="stories-grid">
            <!-- Les Grimoires apparaîtront ici grâce à categoriegenre.js -->
        </div>
        <div id="category-pagination" class="chapter-pagination hidden"></div>
    </div>

</div>
