<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Comtes de Dark & Cristo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header>
		<div id="auth-container" style="position: absolute; top: 20px; right: 20px; display: flex; gap: 10px;">
            <button id="btn-login" class="genre-btn">Se connecter</button>
            <button id="btn-signup" class="genre-btn" style="background-color: #5d1a1a; color: white;">Créer un compte</button>
        </div>
		<div id="user-container" style="display: none; position: absolute; top: 20px; right: 20px; gap: 15px; align-items: center;">
            <span id="user-name" style="color: #e0d7c6; font-family: 'Cinzel', serif; font-size: 1rem; border-bottom: 1px solid #c4a484; padding-bottom: 2px;"></span>
            <button id="btn-publish" class="genre-btn" style="border-color: #00aaff; color: #00aaff; box-shadow: 0 0 5px #00aaff55;">Votre Histoire</button>
            <button id="btn-profile" class="genre-btn">Mon Profil</button>
            <button id="btn-logout" class="genre-btn" style="border-color: #5d1a1a; color: #5d1a1a;">Quitter</button>
        </div>
        <div id="logo-container">
            <img src="Logo.png" alt="Les Comtes de Dark & Cristo">
        </div>
        <h1>Les Comtes de Dark & Cristo</h1>
        
        <div class="language-picker">
            <button onclick="alert('Français sélectionné')">FR</button>
            <button onclick="alert('English selected')">EN</button>
            <button onclick="alert('日本語を選択')">JP</button>
        </div>
    </header>
	
	<nav class="genre-menu">
        <ul>
            <li><button class="genre-btn">High & Low Fantasy</button></li>
            <li><button class="genre-btn">Dark Fantasy & Grimdark</button></li>
            <li><button class="genre-btn">Romantasy Tragique</button></li>
            <li><button class="genre-btn">Sci-Fi & Cyberpunk</button></li>
            <li><button class="genre-btn">Horreur Psychologique</button></li>
        </ul>
    </nav>

    <main>
        <div id="stories-container" style="display: flex; flex-wrap: wrap; gap: 25px; justify-content: center; padding: 40px 20px;">
            <p style="color: #c4a484; font-style: italic; font-family: 'Cinzel', serif;">Recherche dans les archives du sanctuaire...</p>
        </div>

        <div id="oeuvre-page" style="display: none; padding: 40px 20px; color: #e0d7c6; max-width: 1000px; margin: 0 auto;">
            <button id="btn-retour" class="genre-btn" style="margin-bottom: 20px;">← Retour aux archives</button>

            <div style="display: flex; gap: 30px; background-color: #0a0a0a; border: 1px solid #5d1a1a; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.8);">
                
                <div style="flex: 1; min-width: 250px; max-width: 300px;">
                    <img id="oeuvre-cover" src="" style="width: 100%; border: 1px solid #333; margin-bottom: 15px;">
                    <div style="background: #111; padding: 15px; border: 1px solid #333; text-align: center;">
                        <p style="margin: 5px 0; font-size: 0.9rem;">👁️ Vues : <span id="oeuvre-vues">0</span></p>
                        <p style="margin: 5px 0; font-size: 0.9rem;">❤️ Likes : <span id="oeuvre-likes">0</span></p>
                        <button class="genre-btn" style="width: 100%; margin-top: 10px; border-color: #ff0055; color: #ff0055;">Soutenir l'œuvre</button>
                    </div>
                </div>

                <div style="flex: 2;">
                    <span id="oeuvre-genre" style="background-color: #5d1a1a; color: white; padding: 3px 8px; font-size: 0.8rem; text-transform: uppercase;"></span>
                    <h2 id="oeuvre-titre" style="color: #c4a484; font-family: 'Cinzel', serif; font-size: 2rem; margin: 10px 0;"></h2>

                    <div style="background: #111; padding: 15px; border-left: 3px solid #00aaff; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
                        <h4 style="margin: 0; color: #00aaff;">Auteur : <span id="oeuvre-auteur"></span></h4>
                        <button class="genre-btn" style="font-size: 0.7rem; padding: 5px 10px; border-color: #00aaff;">Suivre l'Auteur</button>
                    </div>

                    <h3 style="color: #c4a484; border-bottom: 1px solid #333; padding-bottom: 5px;">Synopsis</h3>
                    <p id="oeuvre-synopsis" style="color: #aaa; line-height: 1.6;"></p>

                    <h3 style="color: #c4a484; border-bottom: 1px solid #333; padding-bottom: 5px; margin-top: 30px;">Chapitres</h3>
                    <div id="chapitres-liste" style="background: #111; border: 1px solid #333; padding: 20px; text-align: center; color: #777; font-style: italic;">
                        Le mécanisme des chapitres est en cours de forge...
                    </div>
                </div>
            </div>
        </div>
    </main>

		<div id="auth-modal" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: #111; padding: 40px; border: 1px solid #c4a484; z-index: 1000; text-align: center; box-shadow: 0 0 20px #000;">
        <h2 style="color: #c4a484; font-family: 'Cinzel', serif; margin-top: 0;">Entrez dans le Sanctuaire</h2>
        <input type="email" id="email-input" placeholder="Votre Email" style="display: block; width: 90%; margin: 15px auto; padding: 10px; background: #0a0a0a; color: #e0d7c6; border: 1px solid #5d1a1a; font-family: 'Segoe UI', sans-serif;">
        <input type="password" id="password-input" placeholder="Votre Mot de Passe" style="display: block; width: 90%; margin: 15px auto; padding: 10px; background: #0a0a0a; color: #e0d7c6; border: 1px solid #5d1a1a; font-family: 'Segoe UI', sans-serif;">
        
        <div style="margin-top: 25px; display: flex; justify-content: center; gap: 15px;">
            <button id="submit-auth" class="genre-btn">Valider</button>
            <button id="close-modal" class="genre-btn" style="border-color: transparent; color: #777;">Fermer</button>
        </div>
    </div>
	<div id="publish-modal" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: #111; padding: 40px; border: 1px solid #c4a484; z-index: 1000; text-align: center; box-shadow: 0 0 20px #00aaff55; width: 80%; max-width: 600px;">
        <h2 style="color: #00aaff; font-family: 'Cinzel', serif; margin-top: 0;">Forger une Œuvre</h2>
        
        <input type="text" id="story-title" placeholder="Titre de l'histoire" style="display: block; width: 90%; margin: 15px auto; padding: 10px; background: #0a0a0a; color: #e0d7c6; border: 1px solid #5d1a1a; font-family: 'Segoe UI', sans-serif;">
        
        <textarea id="story-synopsis" placeholder="Synopsis (Résumé sombre et captivant...)" rows="5" style="display: block; width: 90%; margin: 15px auto; padding: 10px; background: #0a0a0a; color: #e0d7c6; border: 1px solid #5d1a1a; font-family: 'Segoe UI', sans-serif; resize: vertical;"></textarea>
        
        <select id="story-genre" style="display: block; width: 94%; margin: 15px auto; padding: 10px; background: #0a0a0a; color: #e0d7c6; border: 1px solid #5d1a1a; font-family: 'Segoe UI', sans-serif;">
            <option value="">-- Choisissez le Genre --</option>
            <option value="High & Low Fantasy">High & Low Fantasy</option>
            <option value="Dark Fantasy & Grimdark">Dark Fantasy & Grimdark</option>
            <option value="Romantasy Tragique">Romantasy Tragique</option>
            <option value="Sci-Fi & Cyberpunk">Sci-Fi & Cyberpunk</option>
            <option value="Horreur Psychologique">Horreur Psychologique</option>
        </select>

        <input type="file" id="story-cover-file" accept="image/png, image/jpeg, image/webp" style="display: block; width: 90%; margin: 15px auto; padding: 10px; background: #0a0a0a; color: #e0d7c6; border: 1px solid #5d1a1a; font-family: 'Segoe UI', sans-serif;">
        <p style="color: #777; font-size: 0.8rem; margin-top: -10px;">Format: JPG, PNG ou WEBP (Max 5 Mo)</p>
        
        <div style="margin-top: 25px; display: flex; justify-content: center; gap: 15px;">
            <button id="submit-story" class="genre-btn" style="border-color: #00aaff;">Publier</button>
            <button id="close-publish-modal" class="genre-btn" style="border-color: transparent; color: #777;">Annuler</button>
        </div>
    </div>

    <script src="supabaseClient.js"></script>
</body>
</html>
