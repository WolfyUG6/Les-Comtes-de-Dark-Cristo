<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Comtes de Dark & Cristo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header>
	<div id="auth-container" style="position: absolute; top: 20px; right: 20px; display: flex; gap: 10px;">
            <button id="btn-login" class="genre-btn">Se connecter</button>
            <button id="btn-signup" class="genre-btn" style="background-color: #5d1a1a; color: white;">Créer un compte</button>
        </div>
        <div id="logo-container">
            <img src="Logo.png" alt="Les Comtes de Dark & Cristo">
        </div>
        <h1>Les Comtes de Dark & Cristo</h1>
        
        <div class="language-picker">
            <button onclick="alert('Français sélectionné')">FR</button>
            <button onclick="alert('English selected')">EN</button>
            <button onclick="alert('日本語を選択')">JP</button>
        </div>
    </header>
	
	<nav class="genre-menu">
        <ul>
            <li><button class="genre-btn">High & Low Fantasy</button></li>
            <li><button class="genre-btn">Dark Fantasy & Grimdark</button></li>
            <li><button class="genre-btn">Romantasy Tragique</button></li>
            <li><button class="genre-btn">Sci-Fi & Cyberpunk</button></li>
            <li><button class="genre-btn">Horreur Psychologique</button></li>
        </ul>
    </nav>

    <main>
        <p style="margin-top: 50px; text-align: center; font-style: italic;">
            Le sanctuaire est en cours de construction...
        </p>
    </main>

    <script src="supabaseClient.js"></script>
</body>
</html>
